<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactions · Preflights</title>
  <script>(function(){try{var s=localStorage.getItem('cp.theme');var m=s||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(m==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
</head>
<body>
  <header id="topnav"></header>
  <main class="page-wide" id="main">
    <div class="center-load"><span class="spinner"></span><span>Loading interactions…</span></div>
  </main>

  <!-- Add / edit modal (directors) -->
  <div class="modal-backdrop" id="edit-modal">
    <div class="modal" style="max-width:620px">
      <div class="modal-head"><h2 id="em-title">New interaction</h2><button class="modal-close" data-close>×</button></div>
      <div class="alert alert-error" id="em-error" style="display:none"></div>
      <div class="row wrap" style="gap:14px">
        <div class="field grow" style="min-width:160px"><label for="f-course">Course</label><select id="f-course"></select></div>
        <div class="field grow" style="min-width:160px"><label for="f-id">Interaction id (slug)</label>
          <input id="f-id" type="text"><div class="field-hint" id="f-id-hint">Lowercase letters, numbers, hyphens.</div></div>
      </div>
      <div class="field"><label for="f-title">Title</label><input id="f-title" type="text"></div>
      <div class="field"><label for="f-desc">Description (optional)</label>
        <textarea id="f-desc" placeholder="Short description shown to students"></textarea></div>
      <div class="field"><label for="f-url">Artifact URL</label>
        <input id="f-url" type="text" placeholder="https://claude.ai/public/artifacts/...">
        <div class="field-hint">The link students open to launch the activity.</div></div>
      <label class="check-inline"><input type="checkbox" id="f-pub"> Published (visible to students)</label>
      <div class="row" style="gap:10px;margin-top:18px">
        <button class="btn btn-primary" id="em-save">Save</button>
        <button class="btn btn-secondary" data-close>Cancel</button>
      </div>
    </div>
  </div>

  <!-- Report viewer modal -->
  <div class="modal-backdrop" id="report-modal">
    <div class="modal">
      <div class="modal-head"><h2 id="rm-title">Student report</h2><button class="modal-close" data-close>×</button></div>
      <div class="row wrap" style="gap:10px;margin-bottom:14px;align-items:flex-end">
        <div class="grow" style="min-width:120px"><label for="sel-section">Section</label><select id="sel-section"></select></div>
        <div class="grow" style="min-width:160px"><label for="sel-student">Student</label><select id="sel-student"></select></div>
        <button class="btn btn-primary" id="load-report">View</button>
      </div>
      <div class="md-render" id="rm-body"><div class="muted">Pick a section and student, then choose <strong>View</strong>.</div></div>
    </div>
  </div>

  <script type="module">
    import { bootstrap } from '../js/auth.js';
    import { renderNav } from '../js/nav.js';
    import { initTheme } from '../js/theme.js';
    import { esc, pct } from '../js/util.js';
    import * as I from '../js/faculty-interactions.js';

    const ctx = await bootstrap({ require: 'faculty' });
    if (!ctx) { /* redirected */ } else { init(); }

    let vm = null, editingId = null, reportInteraction = null;
    const isDirector = () => ctx.isDirectorForCurrent();

    function init() {
      initTheme();
      renderNav(ctx, { active: 'interactions', onCourseChange: () => load() });
      wireModals();
      load().then(prefillFromQuery);
    }

    const barClass = p => p >= 80 ? '' : p >= 40 ? 'partial' : 'low';

    async function load() {
      const root = document.getElementById('main');
      root.innerHTML = `<div class="center-load"><span class="spinner"></span><span>Loading…</span></div>`;
      vm = await I.loadManager(ctx);

      const newBtn = isDirector()
        ? `<button class="btn btn-primary" id="new-btn">+ New interaction</button>` : '';
      const head = `<div class="page-head">
        <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
          <div><h1>Lesson interactions</h1>
            <div class="sub">${isDirector() ? 'Add, edit, publish, and track completion' : 'Completion across your sections'} for ${esc(ctx.courseTitleOf(ctx.currentCourse))}.</div></div>
          ${newBtn}
        </div></div>`;

      if (vm.noCourse) { root.innerHTML = head + `<div class="alert alert-warn">No course access found.</div>`; return; }
      if (!vm.interactions.length) {
        root.innerHTML = head + `<div class="empty-state"><div class="es-ic">💡</div><h3>No interactions yet</h3>
          <p>${isDirector() ? 'Click <strong>+ New interaction</strong> to add one.' : 'Nothing has been published for your sections yet.'}</p></div>`;
        wireNew();
        return;
      }

      root.innerHTML = head + vm.interactions.map(card).join('');
      wireNew();
      document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => openReports(b.dataset.view, b.dataset.title)));
      document.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.edit)));
      document.querySelectorAll('[data-pub]').forEach(b => b.addEventListener('click', () => doTogglePublish(b.dataset.pub)));
      document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => doDelete(b.dataset.del, b.dataset.title)));
    }

    function card(it) {
      const p = pct(it.done, it.total);
      const status = it.is_published
        ? `<span class="score-badge full">Published</span>`
        : `<span class="score-badge pending">Draft</span>`;
      const completion = it.is_published
        ? `<div style="font-size:1.4em;font-weight:800">${it.total ? p + '%' : '—'}</div>
           <div class="muted" style="font-size:0.78em">${it.done}/${it.total} reports</div>`
        : `<div class="muted" style="font-size:0.82em">Draft · ${it.count} report${it.count === 1 ? '' : 's'}</div>`;

      const chips = (it.is_published && it.perSection.length) ? `<div class="row wrap" style="gap:14px;margin-top:14px">${
        it.perSection.map(s => { const sp = pct(s.done, s.total); return `<div class="progress-row" style="min-width:150px;flex:1">
          <span class="pr-label">${esc(s.sectionId)}</span><span class="pr-count">${s.done}/${s.total}</span>
          <div class="pr-track"><div class="pr-fill ${barClass(sp)}" style="width:${sp}%"></div></div></div>`; }).join('')
      }</div>` : '';

      const view = it.count
        ? `<button class="btn btn-ghost btn-sm" data-view="${esc(it.id)}" data-title="${esc(it.title)}">View reports</button>` : '';
      const manage = isDirector() ? `
        <button class="btn btn-ghost btn-sm" data-edit="${esc(it.id)}">Edit</button>
        <button class="btn btn-ghost btn-sm" data-pub="${esc(it.id)}">${it.is_published ? 'Unpublish' : 'Publish'}</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--red)" data-del="${esc(it.id)}" data-title="${esc(it.title)}">Delete</button>` : '';

      return `<div class="card">
        <div class="row wrap" style="justify-content:space-between;align-items:flex-start;gap:12px">
          <div class="grow" style="min-width:220px">
            <div class="row" style="gap:8px"><div class="card-title">${esc(it.title)}</div>${status}</div>
            <div class="muted" style="font-size:0.8em;margin-top:3px"><code>${esc(it.id)}</code></div>
            ${it.description ? `<div class="muted" style="font-size:0.86em;margin-top:6px">${esc(it.description)}</div>` : ''}
            ${it.artifact_url ? `<a href="${esc(it.artifact_url)}" target="_blank" rel="noopener" style="font-size:0.82em;color:var(--blue-lt);text-decoration:none">Open artifact ↗</a>` : '<div class="muted" style="font-size:0.82em">No artifact URL set</div>'}
          </div>
          <div style="text-align:right;flex-shrink:0">${completion}</div>
        </div>
        ${chips}
        <div class="row wrap" style="gap:8px;margin-top:14px">${view}${manage}</div>
      </div>`;
    }

    function wireNew() { document.getElementById('new-btn')?.addEventListener('click', () => openEdit(null)); }

    // ── Add / edit ──
    function wireModals() {
      ['edit-modal', 'report-modal'].forEach(id => {
        const m = document.getElementById(id);
        m.addEventListener('click', (e) => { if (e.target.id === id || e.target.dataset.close !== undefined) m.classList.remove('open'); });
      });
      document.getElementById('em-save').addEventListener('click', saveEdit);
      document.getElementById('sel-section').addEventListener('change', fillStudents);
      document.getElementById('load-report').addEventListener('click', viewReport);
    }

    // id set → update that existing slug; id null → insert a new row.
    // prefill (from a query link) supplies the values to show; for any field the link
    // omits we fall back to the existing row, so a re-posted link never wipes data.
    function openEdit(id, prefill) {
      editingId = id;
      document.getElementById('em-error').style.display = 'none';
      document.getElementById('f-course').innerHTML = ctx.courses
        .map(c => `<option value="${esc(c.course_id)}">${esc(c.course_title || c.course_id)}</option>`).join('');
      const idField = document.getElementById('f-id'), hint = document.getElementById('f-id-hint');
      const existing = id ? vm.interactions.find(x => x.id === id) : null;

      const pick = (pv, ev) => (pv != null ? pv : (ev ?? ''));
      const vCourse = prefill ? pick(prefill.course, existing?.course_id) : (existing?.course_id ?? ctx.currentCourse);
      const vTitle  = prefill ? pick(prefill.title,  existing?.title)        : (existing?.title ?? '');
      const vDesc   = prefill ? pick(prefill.desc,   existing?.description)  : (existing?.description ?? '');
      const vUrl    = prefill ? pick(prefill.url,    existing?.artifact_url) : (existing?.artifact_url ?? '');
      const vPub    = prefill ? (prefill.pub != null ? prefill.pub : !!existing?.is_published) : !!existing?.is_published;

      document.getElementById('f-course').value = ctx.courses.some(c => c.course_id === vCourse) ? vCourse : ctx.currentCourse;
      idField.value = id ?? (prefill?.id ?? '');
      idField.disabled = !!id;                       // the slug is the PK — fixed once it exists
      hint.textContent = id ? 'The id cannot be changed after creation.' : 'Lowercase letters, numbers, hyphens.';
      document.getElementById('f-title').value = vTitle;
      document.getElementById('f-desc').value  = vDesc;
      document.getElementById('f-url').value   = vUrl;
      document.getElementById('f-pub').checked = vPub;
      document.getElementById('em-title').textContent =
        prefill ? (id ? 'Update interaction — review & save' : 'New interaction — review & save')
                : (id ? 'Edit interaction' : 'New interaction');
      document.getElementById('edit-modal').classList.add('open');
    }

    async function saveEdit() {
      const err = document.getElementById('em-error'); err.style.display = 'none';
      const id = document.getElementById('f-id').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const fields = {
        id, course_id: document.getElementById('f-course').value, title,
        description: document.getElementById('f-desc').value.trim() || null,
        artifact_url: document.getElementById('f-url').value.trim() || null,
        is_published: document.getElementById('f-pub').checked,
      };
      if (!editingId && !/^[a-z0-9-]+$/.test(id)) { err.textContent = 'Id must be lowercase letters, numbers, and hyphens only.'; err.style.display = ''; return; }
      if (!title) { err.textContent = 'Enter a title.'; err.style.display = ''; return; }

      const btn = document.getElementById('em-save');
      btn.disabled = true; btn.innerHTML = '<span class="spinner on-dark"></span> Saving…';
      const { error } = await I.saveInteraction(fields, editingId);
      btn.disabled = false; btn.textContent = 'Save';
      if (error) {
        err.textContent = error.code === '23505' ? `An interaction with id “${id}” already exists.` : 'Could not save: ' + error.message;
        err.style.display = ''; return;
      }
      document.getElementById('edit-modal').classList.remove('open');
      load();
    }

    async function doTogglePublish(id) {
      const it = vm.interactions.find(x => x.id === id);
      const { error } = await I.togglePublish(id, it.is_published);
      if (error) alert('Could not update: ' + error.message);
      load();
    }
    async function doDelete(id, title) {
      if (!confirm(`Delete interaction “${title}”?\n\nThis also deletes every student report submitted for it. This cannot be undone.`)) return;
      const { error } = await I.deleteInteraction(id);
      if (error) alert('Could not delete: ' + error.message);
      load();
    }

    // ── Report viewer ──
    function openReports(interactionId, title) {
      reportInteraction = interactionId;
      document.getElementById('rm-title').textContent = title || 'Student report';
      document.getElementById('sel-section').innerHTML = vm.sections.map(s => `<option value="${esc(s.id)}">${esc(s.id)} (${s.students.length})</option>`).join('')
        || `<option value="">No sections</option>`;
      fillStudents();
      document.getElementById('rm-body').innerHTML = `<div class="muted">Pick a section and student, then choose <strong>View</strong>.</div>`;
      document.getElementById('report-modal').classList.add('open');
    }
    function fillStudents() {
      const sec = vm.sections.find(s => s.id === document.getElementById('sel-section').value);
      document.getElementById('sel-student').innerHTML = (sec?.students || []).map(s => `<option value="${esc(s.student_id)}">${esc(s.name)}</option>`).join('')
        || `<option value="">No students</option>`;
    }
    async function viewReport() {
      const sid = document.getElementById('sel-student').value;
      const body = document.getElementById('rm-body');
      if (!sid || !reportInteraction) return;
      body.innerHTML = `<div class="center-load"><span class="spinner"></span></div>`;
      const md = await I.loadReport(reportInteraction, sid);
      // Report markdown is an inert, user-controllable blob — sanitize at render time.
      body.innerHTML = md ? DOMPurify.sanitize(marked.parse(md))
        : `<div class="alert alert-info">This student hasn't submitted a report for this interaction yet.</div>`;
    }

    // ── Prefill from a query link (e.g. generated by a Claude artifact) ──
    function prefillFromQuery() {
      const p = new URLSearchParams(location.search);
      if (!p.has('new') && !p.has('id') && !p.has('title')) return;
      if (isDirector()) {
        const slug = p.get('id');
        // If the slug already exists, open it in UPDATE mode so Save patches the existing
        // listing instead of failing on the duplicate primary key.
        const existing = slug ? vm.interactions.find(x => x.id === slug) : null;
        openEdit(existing ? existing.id : null, {
          id: slug, course: p.get('course'), title: p.get('title'),
          desc: p.get('desc'), url: p.get('url'),
          pub: p.has('pub') ? ['1', 'true', 'yes'].includes((p.get('pub') || '').toLowerCase()) : null,
        });
      }
      history.replaceState(null, '', location.pathname);   // clean URL so refresh won't re-open
    }
  </script>
</body>
</html>
