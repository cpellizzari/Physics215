<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preflights</title>
  <script>(function(){try{var s=localStorage.getItem('cp.theme');var m=s||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(m==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <div class="center-load">
    <span class="spinner"></span>
    <span>Loading your portal…</span>
  </div>

  <script type="module">
    // Router: resolve session + role, then forward to the right dashboard.
    import { bootstrap } from './js/auth.js';
    const ctx = await bootstrap();              // no `require`; redirects to login if needed
    if (ctx) location.replace(ctx.role === 'faculty' ? 'faculty/dashboard.html' : 'student/dashboard.html');
  </script>
</body>
</html>
