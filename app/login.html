<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Preflights</title>
  <!-- no-flash theme: set data-theme before the stylesheet paints -->
  <script>(function(){try{var s=localStorage.getItem('cp.theme');var m=s||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(m==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>
<body>
  <button class="theme-toggle login-theme-toggle" data-theme-toggle><span data-theme-icon>🌙</span></button>

  <div class="id-screen">
    <div class="id-card">
      <div class="crest">⚛️</div>
      <h1>Preflights</h1>
      <p>USAFA Physics — sign in to continue</p>

      <div id="error" class="alert alert-error" style="display:none"></div>

      <form id="login-form" autocomplete="on">
        <div class="field">
          <label for="identifier">Cadet ID or instructor email</label>
          <input id="identifier" type="text" inputmode="email" autocomplete="username"
                 placeholder="e.g. 1234567 or first.last@afacademy.af.edu" required>
          <div class="field-hint">Cadets: enter your ID (we'll add <code>@usafa.edu</code>). Instructors: use your email.</div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Password" required>
        </div>
        <button id="submit" class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>

      <div class="login-foot">Cadets' default password is the last 6 digits of the cadet ID.</div>
    </div>
  </div>

  <script type="module">
    import { db } from './js/supabase.js';
    import { initTheme } from './js/theme.js';

    initTheme();

    const params = new URLSearchParams(location.search);
    const errEl  = document.getElementById('error');

    // Only allow same-site relative redirects (no open-redirect via ?next=).
    function safeNext() {
      const n = params.get('next');
      if (n && n.startsWith('/') && !n.startsWith('//')) return n;
      return 'index.html';
    }
    function showError(msg) { errEl.textContent = msg; errEl.style.display = ''; }

    if (params.get('err') === 'notreg') {
      showError('That account is not registered as a student or instructor. Contact your course director.');
    }

    // Already signed in? Skip the form.
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) location.replace(safeNext());
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.style.display = 'none';
      const raw = document.getElementById('identifier').value.trim();
      const pw  = document.getElementById('password').value;
      if (!raw || !pw) { showError('Enter your ID/email and password.'); return; }

      const email = raw.includes('@') ? raw : `${raw}@usafa.edu`;
      const btn = document.getElementById('submit');
      btn.disabled = true; btn.innerHTML = '<span class="spinner on-dark"></span> Signing in…';

      const { error } = await db.auth.signInWithPassword({ email, password: pw });
      if (error) {
        btn.disabled = false; btn.textContent = 'Sign in';
        showError(/invalid login/i.test(error.message)
          ? 'Incorrect ID/email or password. Cadets: default password is the last 6 digits of your ID.'
          : 'Sign-in failed: ' + error.message);
        return;
      }
      location.replace(safeNext());
    });
  </script>
</body>
</html>
