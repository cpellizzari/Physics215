<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactions · Preflights</title>
  <script>(function(){try{var s=localStorage.getItem('cp.theme');var m=s||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(m==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
</head>
<body>
  <header id="topnav"></header>
  <main class="page-wide" id="main">
    <div class="center-load"><span class="spinner"></span><span>Loading interactions…</span></div>
  </main>

  <div class="modal-backdrop" id="report-modal">
    <div class="modal">
      <div class="modal-head"><h2 id="rm-title">Your report</h2><button class="modal-close" data-close>×</button></div>
      <div class="md-render" id="rm-body"></div>
    </div>
  </div>

  <script type="module">
    import { db } from '../js/supabase.js';
    import { bootstrap } from '../js/auth.js';
    import { renderNav } from '../js/nav.js';
    import { initTheme } from '../js/theme.js';
    import { loadInteractionStatuses } from '../js/student-data.js';
    import { esc, fmtDate, iconHTML } from '../js/util.js';

    const ctx = await bootstrap({ require: 'student' });
    if (!ctx) { /* redirected */ } else { init(); }

    async function init() {
      initTheme();
      renderNav(ctx, { active: 'interactions', onCourseChange: () => load() });
      document.getElementById('report-modal').addEventListener('click', (e) => {
        if (e.target.id === 'report-modal' || e.target.dataset.close !== undefined) closeModal();
      });
      await load();
    }

    async function load() {
      const root = document.getElementById('main');
      if (!ctx.currentCourse) { root.innerHTML = `<div class="alert alert-warn">Your section isn't assigned to a course yet.</div>`; return; }
      root.innerHTML = `<div class="center-load"><span class="spinner"></span><span>Loading…</span></div>`;
      const items = await loadInteractionStatuses(ctx);

      if (!items.length) {
        root.innerHTML = `<div class="page-head"><h1>Lesson interactions</h1></div>
          <div class="empty-state"><div class="es-ic">💡</div><h3>Nothing published yet</h3>
          <p>Interactive lessons for ${esc(ctx.courseTitleOf(ctx.currentCourse))} will show up here.</p></div>`;
        return;
      }

      const doneCount = items.filter(i => i.done).length;
      const cards = items.map(it => {
        const launch = it.artifact_url
          ? `<a class="btn btn-primary btn-sm" href="${esc(it.artifact_url)}" target="_blank" rel="noopener">${it.done ? 'Re-open ↗' : 'Launch ↗'}</a>`
          : `<span class="muted" style="font-size:0.82em">No link set yet</span>`;
        const view = it.done
          ? `<button class="btn btn-ghost btn-sm" data-view="${esc(it.id)}" data-title="${esc(it.title)}">View my report</button>` : '';
        const badge = it.done
          ? `<span class="tag gold">✓ Completed ${esc(fmtDate(it.submittedAt))}</span>`
          : `<span class="tag">Not started</span>`;
        return `<div class="card">
          <div class="row wrap" style="justify-content:space-between;align-items:flex-start;gap:16px">
            <div class="grow" style="min-width:220px">
              <div class="row" style="gap:8px"><div class="card-title">${esc(it.title)}</div>${badge}</div>
              ${it.description ? `<div class="muted" style="font-size:0.88em;margin-top:6px">${esc(it.description)}</div>` : ''}
            </div>
            <div class="row" style="gap:8px;flex-shrink:0">${view}${launch}</div>
          </div></div>`;
      }).join('');

      root.innerHTML = `<div class="page-head"><h1>Lesson interactions</h1>
        <div class="sub">Work through a lesson; when you finish it sends your report back to your record.
          ${doneCount}/${items.length} completed.</div></div>${cards}`;

      root.querySelectorAll('[data-view]').forEach(b =>
        b.addEventListener('click', () => viewReport(b.dataset.view, b.dataset.title)));
    }

    async function viewReport(interactionId, title) {
      document.getElementById('rm-title').textContent = title || 'Your report';
      const body = document.getElementById('rm-body');
      body.innerHTML = `<div class="center-load"><span class="spinner"></span></div>`;
      openModal();
      const { data } = await db.from('preflight_interaction_reports')
        .select('report_markdown, updated_at')
        .eq('student_id', ctx.studentRow.student_id).eq('interaction_id', interactionId).maybeSingle();
      // Stored markdown is an inert, user-controllable blob — sanitize at render time.
      body.innerHTML = data?.report_markdown
        ? DOMPurify.sanitize(marked.parse(data.report_markdown))
        : `<div class="muted">No report found.</div>`;
    }

    function openModal()  { document.getElementById('report-modal').classList.add('open'); }
    function closeModal() { document.getElementById('report-modal').classList.remove('open'); }
  </script>
</body>
</html>
