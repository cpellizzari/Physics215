<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — Embedded Artifact</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
    }
    .embed-wrap {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe {
      display: block;
      border: 0;
    }
    #banner {
      display: none;
      background: #1f6feb;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    #banner.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div id="banner"></div>
    <h1>Lesson 02 Preflight — Electric Charge &amp; Coulomb's Law</h1>
    <div class="embed-wrap">
<iframe src="https://claude.site/public/artifacts/c1ca3ecf-43c4-4a5d-9936-6011656ec5db/embed" title="lesson_02_preflight_electric_charge_coulombs_law.jsx" width="100%" height="600" frameborder="0" allow="clipboard-write" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // Read data passed in the URL and show it at the top — no reload, no server.
    // Supports BOTH styles:
    //   query string:  test.html?score=5&name=Cadet+Smith   (hits server logs)
    //   hash fragment: test.html#score=5&name=Cadet+Smith   (never leaves browser — better for PII)
    (function () {
      // hash takes priority; fall back to query string
      var raw = location.hash ? location.hash.slice(1) : location.search.slice(1);
      if (!raw) return;

      var params = new URLSearchParams(raw);
      var parts = [];
      params.forEach(function (value, key) {
        parts.push(key + ': ' + value);
      });
      if (!parts.length) return;

      var banner = document.getElementById('banner');
      banner.textContent = parts.join('  •  ');
      banner.classList.add('show');
    })();
  </script>
</body>
</html>
