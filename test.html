<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JiTT Report</title>

  <!-- Decompression + Markdown rendering, both client-side from cdnjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #1b2a4a;
      line-height: 1.55;
      max-width: 760px;
      margin: 32px auto;
      padding: 0 20px;
    }

    /* The ?q= banner (kept from the earlier behavior) */
    #banner {
      display: none;
      background: #1f6feb;
      color: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    #banner.show { display: block; }

    /* A visible message for empty / corrupt states — never a blank page */
    #message {
      display: none;
      background: #fff4e5;
      border: 1px solid #f0c890;
      color: #7a4a00;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    #message.show { display: block; }

    /* Rendered report */
    #report h1 { font-size: 1.6rem; margin: 0.6em 0 0.4em; }
    #report h2 { font-size: 1.3rem; margin: 1em 0 0.4em; }
    #report h3 { font-size: 1.1rem; margin: 1em 0 0.4em; }
    #report blockquote {
      margin: 1em 0;
      padding: 0.4em 1em;
      border-left: 4px solid #1f6feb;
      background: #f5f8ff;
      color: #334;
    }
    #report table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 0.95rem;
    }
    #report th,
    #report td {
      border: 1px solid #cbd5e1;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    #report th { background: #f1f5f9; }
    #report code {
      background: #f1f5f9;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div id="banner"></div>
  <div id="message"></div>
  <div id="report"></div>

  <script>
    // ----- All processing is client-side. The hash is never sent to a server or logged. -----

    function showMessage(text) {
      var el = document.getElementById("message");
      el.textContent = text;
      el.classList.add("show");
    }

    // 1) Keep the existing ?q= behavior (independent of the report path).
    (function () {
      var q = new URLSearchParams(location.search).get("q");
      if (q) {
        var banner = document.getElementById("banner");
        banner.textContent = "✓ Received — q: " + q;
        banner.classList.add("show");
      }
    })();

    // 2) The report rides in the hash: #r=<lz-string compressed markdown>
    (function () {
      var params = new URLSearchParams(location.hash.slice(1));
      var packed = params.get("r");

      if (!packed) {
        showMessage("No report data in the URL.");
        return;
      }

      var markdown = null;
      try {
        markdown = LZString.decompressFromEncodedURIComponent(packed);
      } catch (e) {
        markdown = null;
      }

      if (!markdown) {
        showMessage("Could not decode the report — the link may be incomplete.");
        return;
      }

      // Sanitize the rendered HTML before inserting — the payload comes from a
      // user-controllable URL, so treat it as untrusted to prevent XSS.
      var dirty = marked.parse(markdown);
      document.getElementById("report").innerHTML = DOMPurify.sanitize(dirty);
    })();
  </script>
</body>
</html>
