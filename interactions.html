<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Interactions</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
</head>
<body>

<header class="site-header">
  <span class="logo" id="course-logo">Lesson Interactions</span>
  <span class="subtitle">USAFA</span>
  <span class="spacer"></span>
</header>

<div class="page">
  <h2 style="margin-bottom:4px" id="heading">Available Lesson Interactions</h2>
  <p style="color:var(--muted); font-size:0.88em; margin-bottom:20px">
    Open a lesson to work through it. When you finish, the activity sends your report back here to be saved to your record.
  </p>

  <div id="list"></div>
  <div id="empty" class="alert alert-info" style="display:none">
    No lesson interactions are published yet. Check back later.
  </div>
</div>

<script>
const urlCourse    = new URLSearchParams(location.search).get('course') || 'phys-215';
const courseTitles = { 'phys-215': 'Physics 215', 'phys-110': 'Physics 110' };
const courseTitle  = courseTitles[urlCourse] || urlCourse;

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function load() {
  document.getElementById('course-logo').textContent = courseTitle;
  document.getElementById('heading').textContent = `${courseTitle} — Lesson Interactions`;
  document.title = `${courseTitle} — Lesson Interactions`;

  const listEl = document.getElementById('list');
  listEl.innerHTML = '<div style="color:var(--muted);font-size:0.9em">Loading…</div>';

  // RLS shows only published rows to anonymous/student visitors.
  const { data, error } = await db.from('interactions')
    .select('id, title, description, artifact_url, is_published')
    .eq('course_id', urlCourse)
    .eq('is_published', true)
    .order('title', { ascending: true });

  if (error || !data?.length) {
    listEl.innerHTML = '';
    document.getElementById('empty').style.display = '';
    return;
  }

  listEl.innerHTML = '';
  data.forEach(it => {
    const card = document.createElement('div');
    card.className = 'card';
    const launch = it.artifact_url
      ? `<a class="btn btn-primary" href="${esc(it.artifact_url)}" target="_blank" rel="noopener">Launch lesson ↗</a>`
      : `<span style="font-size:0.82em;color:var(--muted)">No link set yet</span>`;
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap">
        <div style="flex:1; min-width:200px">
          <div class="card-title">${esc(it.title)}</div>
          ${it.description ? `<div style="font-size:0.88em;color:var(--muted);margin-top:4px">${esc(it.description)}</div>` : ''}
        </div>
        <div style="flex-shrink:0">${launch}</div>
      </div>`;
    listEl.appendChild(card);
  });
}

load();
</script>
</body>
</html>
